<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport: mobile browsers scale page correctly -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduMini — Mobile</title>
  <!-- jQuery Mobile theme + structure (CDN = no local install) -->
  <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">
  <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
  <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
</head>
<body>

  <!-- data-role="page" = one screen; jQM shows one page at a time, swaps with transitions -->
  <div data-role="page" id="home">
    <div data-role="header"><h1>EduMini</h1></div>
    <div data-role="content">
      <p>Education mini project (full stack).</p>
      <ul data-role="listview" data-inset="true">
        <li><a href="#courses">Browse courses</a></li>
        <li><a href="#enroll">Enroll</a></li>
        <li><a href="#list">My enrollments</a></li>
      </ul>
    </div>
  </div>

  <div data-role="page" id="courses">
    <div data-role="header"><a href="#home" data-icon="home" data-direction="reverse">Home</a><h1>Courses</h1></div>
    <div data-role="content">
      <ul data-role="listview" id="courseList" data-inset="true">
        <li>Loading…</li>
      </ul>
    </div>
  </div>

  <div data-role="page" id="enroll">
    <div data-role="header"><a href="#home" data-icon="home" data-direction="reverse">Home</a><h1>Enroll</h1></div>
    <div data-role="content">
      <form id="enrollForm">
        <label for="studentName">Your name</label>
        <input name="studentName" id="studentName" type="text" required>
        <label for="coursePick">Course</label>
        <select name="courseTitle" id="coursePick" required></select>
        <button type="submit" data-theme="b">Submit</button>
      </form>
      <p id="enrollMsg"></p>
    </div>
  </div>

  <div data-role="page" id="list">
    <div data-role="header"><a href="#home" data-icon="home" data-direction="reverse">Home</a><h1>Enrollments</h1></div>
    <div data-role="content">
      <ul data-role="listview" id="enrollList" data-inset="true"><li>Loading…</li></ul>
    </div>
  </div>

  <script>
    /**
     * pageinit: jQuery Mobile fires when a page is first created.
     * We load JSON from the same Express server (relative URLs = same host/port).
     */
    $(document).on('pageinit', '#courses', function () {
      $.getJSON('/api/courses', function (data) {
        var html = '';
        $.each(data, function (_, c) {
          html += '<li>' + c.title + '</li>';
        });
        $('#courseList').html(html).listview('refresh');
      });
    });

    // Fill the course select once when that page opens
    $(document).on('pageinit', '#enroll', function () {
      $.getJSON('/api/courses', function (data) {
        var opts = '<option value="">Choose…</option>';
        $.each(data, function (_, c) {
          opts += '<option value="' + c.title + '">' + c.title + '</option>';
        });
        $('#coursePick').html(opts).selectmenu('refresh');
      });
    });

    $(document).on('pageinit', '#list', function () {
      $.getJSON('/api/enrollments', function (rows) {
        if (!rows.length) {
          $('#enrollList').html('<li>No enrollments yet</li>').listview('refresh');
          return;
        }
        var html = '';
        $.each(rows, function (_, r) {
          html += '<li><h2>' + r.studentName + '</h2><p>' + r.courseTitle + '</p></li>';
        });
        $('#enrollList').html(html).listview('refresh');
      });
    });

    // AJAX POST: send JSON body; prevent default form navigation
    $('#enrollForm').on('submit', function (e) {
      e.preventDefault();
      var payload = {
        studentName: $('#studentName').val(),
        courseTitle: $('#coursePick').val()
      };
      $.ajax({
        url: '/api/enroll',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(payload),
        success: function () {
          $('#enrollMsg').text('Saved! Check My enrollments.');
        },
        error: function () {
          $('#enrollMsg').text('Error — try again.');
        }
      });
    });
  </script>
</body>
</html>
