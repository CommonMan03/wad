<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exp4-A jQuery Mobile</title>
  <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">
  <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
  <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
</head>
<body>
  <!-- Simple mobile website with two pages -->
  <div data-role="page" id="home">
    <div data-role="header"><h1>Mobile Home</h1></div>
    <div data-role="content"><a href="#about" class="ui-btn">Go to About</a></div>
  </div>
  <div data-role="page" id="about">
    <div data-role="header"><a href="#home" data-icon="back">Back</a><h1>About</h1></div>
    <div data-role="content"><p>This is jQuery Mobile demo.</p></div>
  </div>
</body>
</html>
