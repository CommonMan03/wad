<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exp1-B Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light">
  <div class="container py-4" style="max-width: 520px;">
    <h4>Register User (AJAX + localStorage)</h4>
    <a href="./list.html" class="btn btn-sm btn-outline-primary mb-2">Open List</a>
    <form id="f" class="card p-3">
      <input id="name" class="form-control mb-2" placeholder="Name" required />
      <input id="email" type="email" class="form-control mb-2" placeholder="Email" required />
      <button class="btn btn-primary">Save</button>
    </form>
    <p id="msg" class="mt-2"></p>
  </div>
  <script>
    document.getElementById("f").onsubmit = function (e) {
      e.preventDefault(); // keep page from reloading
      const user = { id: Date.now(), name: document.getElementById("name").value,
email: document.getElementById("email").value };

      // AJAX POST demo
      const x = new XMLHttpRequest();
      x.open("POST", "https://jsonplaceholder.typicode.com/posts");
      x.setRequestHeader("Content-Type", "application/json");
      x.onload = save;
      x.onerror = save; // still save locally if network fails
      x.send(JSON.stringify(user));

      function save() {
        const arr = JSON.parse(localStorage.getItem("users") || "[]");
        arr.push(user);
        localStorage.setItem("users", JSON.stringify(arr));
        msg.textContent = "Saved!";
        f.reset();
      }
    };
  </script>
</body>
</html>
