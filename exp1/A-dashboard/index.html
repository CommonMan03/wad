<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exp1-A Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    /* Minimal sidebar + cards to show concept */
    .sidebar { min-height: 100vh; background: #1f2937; }
    .sidebar a { color: #d1d5db; display: block; padding: 10px; text-decoration: none; }
    .sidebar a:hover { background: #111827; color: #fff; }
  </style>
</head>
<body class="bg-light">
  <div class="container-fluid">
    <div class="row">
      <aside class="col-md-2 sidebar text-white p-2">
        <h5 class="p-2">Admin</h5>
        <a href="#">Dashboard</a>
        <a href="#">Students</a>
        <a href="#">Exams</a>
      </aside>
      <main class="col-md-10 p-3">
        <h3>College / Exam Dashboard</h3>
        <div class="row g-3 mt-1">
          <!-- Bootstrap cards = simple statistics -->
          <div class="col-sm-6 col-lg-3"><div class="card p-3"><small>Students</small><h4>4582</h4></div></div>
          <div class="col-sm-6 col-lg-3"><div class="card p-3"><small>Exams</small><h4>38</h4></div></div>
          <div class="col-sm-6 col-lg-3"><div class="card p-3"><small>Pass Rate</small><h4>87%</h4></div></div>
          <div class="col-sm-6 col-lg-3"><div class="card p-3"><small>Courses</small><h4>126</h4></div></div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
